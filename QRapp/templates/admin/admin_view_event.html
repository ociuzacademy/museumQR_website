{% extends "admin/admin_home.html" %}
{% block content %}

    <title>Event Details</title>

    <div class="container mt-5">
        <div class="event-details-card shadow-lg p-4 rounded bg-white">
            <h2 class="text-center custom-event-title">{{ event.name }}</h2> <!-- Custom class instead of .text-primary -->
            <div class="text-center">
                {% if event.image %}
                    <img src="{{ event.image.url }}" alt="{{ event.name }}" class="event-image">
                {% endif %}
            </div>
            <div class="event-info mt-4">
                <h5 class="text-dark">{{ event.name }}</h5>
                <p class="text-muted">{{ event.description|linebreaks|safe }}</p>
                <p><strong>Date:</strong> {{ event.event_date }}</p>
            </div>
        </div>
    </div>

    <br>
    <style>
/* Event Details Page Styles */
.event-details-card {
    max-width: 800px;
    margin: auto;
    padding: 2rem;
    border-radius: 15px;
    background: #ffffff;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
}

.event-details-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
}

.event-image {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    border-radius: 8px;
    transition: transform 0.3s ease-in-out;
}

.event-image:hover {
    transform: scale(1.03);
}

.custom-event-title {
    font-size: 2.2rem;
    font-weight: 700;
    text-transform: capitalize;
    letter-spacing: 1.2px;
    color: #2c3e50; /* Elegant dark blue */
    text-align: center;
    margin-bottom: 1.5rem;
}

.event-info {
    text-align: center;
    padding: 1rem;
}

.event-info h5 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 0.7rem;
    color: #34495e; /* Dark gray-blue */
}

.event-info p {
    font-size: 1rem;
    color: #666;
    margin-bottom: 0.7rem;
    line-height: 1.6;
}

/* Responsive Design */
@media (max-width: 768px) {
    .custom-event-title {
        font-size: 1.8rem;
        letter-spacing: 1px;
    }

    .event-details-card {
        padding: 1.5rem;
    }

    .event-info h5 {
        font-size: 1.4rem;
    }

    .event-info p {
        font-size: 0.95rem;
    }
}

@media (max-width: 480px) {
    .custom-event-title {
        font-size: 1.6rem;
        letter-spacing: 0.8px;
    }

    .event-info h5 {
        font-size: 1.2rem;
    }

    .event-info p {
        font-size: 0.9rem;
    }
}

    </style>
{% endblock %}
